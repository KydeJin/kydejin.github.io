baseURL: "https://kydejin.github.io/"
title: Kyde Jin
theme: ["./PaperModel"]

# 语言设置
languageCode: "zh-cn"
defaultContentLanguage: "zh"

# 菜单配置 (右上角导航)
menu:
  main:
    - identifier: categories
      name: 分类
      url: /categories/
      weight: 10
    - identifier: tags
      name: 标签
      url: /tags/
      weight: 20
    - identifier: about
      name: 关于
      url: /about/
      weight: 30

# PaperMod 主题特定配置
params:
  # 主页配置
  homeInfoParams:
    Title: "Hello GitHub"
    Content: "https://kydejin.github.io"

  # 社交图标配置
  socialIcons:
    - name: github
      url: "https://github.com/kydejin"
    - name: email
      url: "mailto:kydejin@163.com"

  # 界面设置
  defaultTheme: auto # 自动跟随系统深色/浅色模式
  ShowShareButtons: true
  ShowReadingTime: true
  ShowCodeCopyButtons: true
  
  # 头像
  profileMode:
    enabled: true
    title: "Kyde Jin"
    subtitle: "探索技术，记录生活"
    imageUrl: "https://github.com/kydejin_logo.png" # 这里可以放你的头像链接
    imageTitle: "我的头像"

# 允许生成包含中文的文件
markup:
  goldmark:
    renderer:
      unsafe: true

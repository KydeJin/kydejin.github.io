baseURL: "https://你的用户名.github.io/"
title: 我的极简博客
theme: ["PaperMod"]

# 语言设置
languageCode: "zh-cn"
defaultContentLanguage: "zh"

# 菜单配置 (右上角导航)
menu:
  main:
    - identifier: categories
      name: 分类
      url: /categories/
      weight: 10
    - identifier: tags
      name: 标签
      url: /tags/
      weight: 20
    - identifier: about
      name: 关于
      url: /about/
      weight: 30

# PaperMod 主题特定配置
params:
  # 主页配置
  homeInfoParams:
    Title: "欢迎来到我的博客"
    Content: "这里是我的数字花园，记录技术与生活。"

  # 社交图标配置
  socialIcons:
    - name: github
      url: "https://github.com/你的用户名"
    - name: email
      url: "mailto:你的邮箱@example.com"

  # 界面设置
  defaultTheme: auto # 自动跟随系统深色/浅色模式
  ShowShareButtons: true
  ShowReadingTime: true
  ShowCodeCopyButtons: true
  
  # 头像
  profileMode:
    enabled: true
    title: "我的博客"
    subtitle: "探索技术，记录生活"
    imageUrl: "https://github.com/你的用户名.png" # 这里可以放你的头像链接
    imageTitle: "我的头像"

# 允许生成包含中文的文件
markup:
  goldmark:
    renderer:
      unsafe: true

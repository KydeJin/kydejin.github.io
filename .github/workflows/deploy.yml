name: Deploy Hugo Site

# 这里定义了触发条件：只有当 Pull Request 合并到 main 分支时才运行
on:
  pull_request:
    branches:
      - main
    types:
      - closed  # 监听 PR 关闭事件

jobs:
  deploy:
    # 这里加了一个判断：只有当 PR 是“合并”而不是“关闭”时才执行
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true  # 必须开启，否则无法下载主题
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build
        run: hugo --minify

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
